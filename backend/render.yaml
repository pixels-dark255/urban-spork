services:
  - type: web
    name: stock-analyzer
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: NEWS_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TICK_MINUTES
        value: "5"
